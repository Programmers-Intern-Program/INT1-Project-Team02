spring:
  datasource:
    # 팀 로컬 기본값은 docker-compose.yml과 동일하게 유지한다.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}?reWriteBatchedInserts=true
    username: ${DB_USERNAME}
    # 비밀번호는 .env/IDE 환경변수에서 주입한다.
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100

glm:
  # 실제 GLM SDK 구현체가 붙기 전까지는 기본 비활성 상태로 둡니다.
  enabled: ${GLM_ENABLED:false}
  api:
    key: ${GLM_API_KEY:}
    model: ${GLM_API_MODEL:glm-5}
